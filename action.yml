name: Sieve Security Scan
description: AI-powered vulnerability scanner that finds real security issues and suppresses false positives.
author: Fendora UG (haftungsbeschränkt)

branding:
  icon: shield
  color: yellow

inputs:
  api-key:
    description: Sieve API key (store as a repo secret)
    required: true
  api-url:
    description: Sieve API base URL
    required: false
    default: https://sieve.devberlin.de
  repo-alias:
    description: Short name for this repo in scan results (defaults to repo name)
    required: false
    default: ""
  fail-on-findings:
    description: Exit with code 1 if real vulnerabilities are found
    required: false
    default: "true"

outputs:
  total:
    description: Total number of findings scanned
  flagged:
    description: Number of findings Sieve considers likely real vulnerabilities
  scan-id:
    description: Unique ID for this scan run

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install scanner
      shell: bash
      run: pip install semgrep requests --quiet

    - name: Scan repository
      shell: bash
      run: |
        semgrep --config p/owasp-top-ten --json --quiet . \
          > /tmp/sieve-raw.json 2>/dev/null || true

    - name: Analyse with Sieve
      shell: bash
      id: sieve
      env:
        SIEVE_API_KEY: ${{ inputs.api-key }}
        SIEVE_API_URL: ${{ inputs.api-url }}
        REPO_ALIAS: ${{ inputs.repo-alias || github.repository }}
      run: |
        python3 << 'EOF'
        import json, os, sys, uuid, urllib.request, urllib.error

        semgrep = json.load(open("/tmp/sieve-raw.json"))
        api_url = os.environ["SIEVE_API_URL"].rstrip("/")
        api_key = os.environ["SIEVE_API_KEY"]
        alias   = os.environ["REPO_ALIAS"]

        payload = json.dumps({"semgrep_output": semgrep, "repo": alias}).encode()
        req = urllib.request.Request(
            f"{api_url}/scan",
            data=payload,
            headers={"Content-Type": "application/json", "X-API-Key": api_key},
            method="POST",
        )
        try:
            with urllib.request.urlopen(req, timeout=120) as r:
                result = json.loads(r.read())
        except urllib.error.HTTPError as e:
            print(f"::error::Sieve API error {e.code}: {e.read().decode()}")
            sys.exit(1)
        except Exception as e:
            print(f"::error::Failed to reach Sieve API: {e}")
            sys.exit(1)

        total    = result["total"]
        flagged  = result["flagged"]
        findings = result["findings"]
        scan_id  = str(uuid.uuid4())

        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"total={total}\n")
            f.write(f"flagged={flagged}\n")
            f.write(f"scan-id={scan_id}\n")

        with open("/tmp/sieve-findings.json", "w") as f:
            json.dump({"total": total, "flagged": flagged,
                       "findings": findings, "scan_id": scan_id}, f)

        real = [f for f in findings if f["predicted_label"] == 1]
        suppressed = total - flagged
        print(f"Summary: {flagged} real · {suppressed} suppressed · {total} total")
        for f in sorted(real, key=lambda x: x["confidence_score"], reverse=True):
            print(f"  [{f['confidence_score']:.2f}] {f['check_id']}  {f['file']}:{f['line_start']}")
        EOF

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const { total, flagged, findings, scan_id } =
            JSON.parse(fs.readFileSync('/tmp/sieve-findings.json', 'utf8'));
          const real = findings
            .filter(f => f.predicted_label === 1)
            .sort((a, b) => b.confidence_score - a.confidence_score);
          const suppressed = total - flagged;
          const summary = `${flagged} real · ${suppressed} suppressed · ${total} total`;
          const marker = '<!-- sieve-scan -->';

          let body;
          if (real.length === 0) {
            body = `## Sieve Security Scan ✅\n\nNo likely vulnerabilities found.\n\n_${summary}_`;
          } else {
            const rows = real.map(f => {
              const rule = f.check_id.split('.').pop();
              return `| \`${rule}\` | \`${f.file}\` | ${f.line_start} | ${f.confidence_score.toFixed(2)} |`;
            }).join('\n');
            body = [
              `## Sieve Security Scan ⚠️`,
              ``,
              `**${real.length} finding(s) flagged as likely real** — the rest were suppressed as false positives.`,
              ``,
              `| Rule | File | Line | Score |`,
              `|------|------|------|-------|`,
              rows,
              ``,
              `_${summary}_`,
              `_scan\\_id: \`${scan_id}\`_`,
              ``,
              `<sub>Powered by [Sieve](https://github.com/fendora-io/sieve-action) · AI security scanner by [Fendora](https://fendora.io)</sub>`,
            ].join('\n');
          }

          const fullBody = `${marker}\n${body}`;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: existing.id, body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: fullBody,
            });
          }

    - name: Fail on findings
      if: inputs.fail-on-findings == 'true'
      shell: bash
      run: |
        FLAGGED=$(python3 -c "import json; print(json.load(open('/tmp/sieve-findings.json'))['flagged'])")
        if [ "$FLAGGED" -gt 0 ]; then
          echo "::error::Sieve flagged $FLAGGED likely real vulnerability(ies). Review the PR comment for details."
          exit 1
        fi
