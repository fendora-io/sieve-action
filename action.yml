name: Sieve Security Scan
description: AI-powered security scanner that finds real security issues and suppresses false positives.
author: Fendora UG (haftungsbeschränkt)

branding:
  icon: shield
  color: yellow

inputs:
  repo-alias:
    description: Short name for this repo in scan results (defaults to repo name)
    required: false
    default: ""
  fail-on-findings:
    description: Exit with code 1 if real vulnerabilities are found
    required: false
    default: "true"

outputs:
  total:
    description: Total number of findings scanned
  flagged:
    description: Number of findings Sieve considers likely real vulnerabilities
  scan-id:
    description: Unique ID for this scan run

runs:
  using: docker
  image: Dockerfile
  env:
    GITHUB_TOKEN: ${{ github.token }}
