name: Support / Question
description: Need help setting up or using Sieve?
labels: ["support"]
body:
  - type: markdown
    attributes:
      value: |
        We're happy to help. For urgent issues email **contact@fendora.io**.

  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Your workflow file (if relevant)
      render: yaml

  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: "e.g. v1.4.0"
