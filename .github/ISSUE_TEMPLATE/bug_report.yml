name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Action version
      description: Which version of sieve-action are you using?
      placeholder: "e.g. v1.4.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant action logs
      description: Paste the relevant section from the GitHub Actions run log.
      render: shell

  - type: textarea
    id: workflow
    attributes:
      label: Your workflow file
      description: Paste your sieve-action workflow configuration.
      render: yaml
