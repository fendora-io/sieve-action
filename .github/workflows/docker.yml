name: Build & Push Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/fendora-io/sieve-action
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate image metadata
        env:
          REF_NAME: ${{ github.ref_name }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          if [[ "${REF_NAME}" != "main" && ! "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid ref name: ${REF_NAME}" >&2
            exit 1
          fi
          for tag in ${TAGS}; do
            case "${tag}" in
              ghcr.io/fendora-io/sieve-action:latest|ghcr.io/fendora-io/sieve-action:v[0-9]*.[0-9]*.[0-9]*) ;;
              *) echo "Invalid image tag: ${tag}" >&2; exit 1 ;;
            esac
          done

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sign:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release metadata
        env:
          REF_NAME: ${{ github.ref_name }}
          DIGEST: ${{ needs.build.outputs.digest }}
          TAGS: ${{ needs.build.outputs.tags }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ ! "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${REF_NAME}" >&2
            exit 1
          fi
          if [[ "${REPOSITORY}" != "fendora-io/sieve-action" ]]; then
            echo "Invalid repository: ${REPOSITORY}" >&2
            exit 1
          fi
          if [[ ! "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid digest: ${DIGEST}" >&2
            exit 1
          fi
          RELEASE_TAGS=""
          for tag in ${TAGS}; do
            case "${tag}" in
              ghcr.io/fendora-io/sieve-action:v[0-9]*.[0-9]*.[0-9]*)
                RELEASE_TAGS="${RELEASE_TAGS} ${tag}"
                ;;
              ghcr.io/fendora-io/sieve-action:latest)
                # Tag pushes may include "latest" in metadata output; never sign/publish it as a release artifact.
                ;;
              *) echo "Invalid image tag: ${tag}" >&2; exit 1 ;;
            esac
          done
          if [[ -z "${RELEASE_TAGS// /}" ]]; then
            echo "No release image tags found in TAGS output" >&2
            exit 1
          fi

      - name: Sign container image
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          TAGS: ${{ needs.build.outputs.tags }}
        run: |
          for tag in ${TAGS}; do
            case "${tag}" in
              ghcr.io/fendora-io/sieve-action:v[0-9]*.[0-9]*.[0-9]*) ;;
              ghcr.io/fendora-io/sieve-action:latest) continue ;;
              *) continue ;;
            esac
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Sign and upload release attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ needs.build.outputs.digest }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "${DIGEST}" > image-digest.txt
          cosign sign-blob --yes image-digest.txt --bundle image-digest.sigstore.json
          gh release upload "${RELEASE_TAG}" image-digest.sigstore.json --clobber --repo "fendora-io/sieve-action"

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          image: ghcr.io/fendora-io/sieve-action@${{ needs.build.outputs.digest }}
          output-file: sbom.spdx.json

      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "${RELEASE_TAG}" sbom.spdx.json --clobber --repo "fendora-io/sieve-action"
