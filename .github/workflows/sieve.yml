name: Sieve Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  sieve-scan:
    name: Sieve PR scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: fendora-io/sieve-action@v1.2.0
        with:
          repo-alias: fendora-io/sieve-action
          fail-on-findings: "false"
