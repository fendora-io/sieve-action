name: DCO

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  signoff:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - name: Check Signed-off-by on every commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          missing=0

          if [ "$EVENT_NAME" = "pull_request" ]; then
            shas=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[].sha')
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            shas="$AFTER_SHA"
          else
            shas=$(gh api "repos/$REPO/compare/${BEFORE_SHA}...${AFTER_SHA}" --jq '.commits[].sha')
          fi

          for sha in $shas; do
            parents=$(gh api "repos/$REPO/commits/$sha" --jq '.parents | length')
            if [ "$parents" -gt 1 ]; then
              continue
            fi
            msg=$(gh api "repos/$REPO/git/commits/$sha" --jq '.message')
            if ! echo "$msg" | grep -qE '(^|\n)Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit ${sha:0:12} is missing a Signed-off-by trailer."
              echo "Subject: $(echo "$msg" | head -1)"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Fix with: git rebase origin/main --signoff && git push --force-with-lease"
            exit 1
          fi

          echo "All commits have a valid Signed-off-by trailer."
