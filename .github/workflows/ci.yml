name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Validate action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check action.yml is valid YAML
        run: python3 -c "import yaml, sys; yaml.safe_load(open('action.yml'))" && echo "action.yml is valid"

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install test dependencies
        run: pip install requests

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

  sca:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on --fail-on high
