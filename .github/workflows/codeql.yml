name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@f6a16bef8e5c39e398e4da16862d381f76824ac6 # v3
        with:
          languages: python

      - uses: github/codeql-action/analyze@f6a16bef8e5c39e398e4da16862d381f76824ac6 # v3
